spring.application.name=msventas

# ===============================
# CONFIGURACION DE LA BASE DE DATOS
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/SDVentas?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=America/Bogota
spring.datasource.username=root
spring.datasource.password=toor
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# CONFIGURACION DE JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# CONFIGURACION DE PUERTO
# ===============================
server.port=8086

# ===============================
# CONFIGURACION DE OTROS SERVICIOS (URLs)
# ===============================
service.clientes.url=http://localhost:8081
service.productos.url=http://localhost:8080