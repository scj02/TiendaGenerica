worker_processes 1;

events {
    worker_connections 1024;
}

http {
    sendfile on;

    # Usar el DNS interno de Docker (127.0.0.11) para resolver los nombres de los contenedores
    # Esto evita que Nginx crashee si los contenedores no están listos instantáneamente
    resolver 127.0.0.11 valid=10s;

    server {
        listen 8080;

        location /msclientes {
            set $upstream_clientes http://msclientes:8080;
            proxy_pass $upstream_clientes$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /msproductos {
            set $upstream_productos http://msproductos:8080;
            proxy_pass $upstream_productos$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /msproveedores {
            set $upstream_proveedores http://msproveedores:8080;
            proxy_pass $upstream_proveedores$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /msusuarios {
            set $upstream_usuarios http://msusuarios:8080;
            proxy_pass $upstream_usuarios$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /msventas {
            set $upstream_ventas http://msventas:8080;
            proxy_pass $upstream_ventas$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}